<!DOCTYPE html>
<html>
<head>
  <title>Explore</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Playfair+Display&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
  <a href="explore.html" class="brand">Cup<span>Log</span></a>

  <ul class="nav-links">
    <li><a href="explore.html">Explore</a></li>
    <li><a href="user.html">My Journal</a></li>
    <li><a href="login.html">Logout</a></li>
  </ul>
</div>

<div class="container mt-4">

  <h2>Explore Community ☕</h2>
  <p class="subtitle">Discover coffee lovers and find your perfect match</p>

  <!-- SEARCH -->
  <input type="text" id="searchUser" class="form-control mb-4" placeholder="Search users...">

  <!-- MATCH SECTION -->
  <div class="card p-3 mb-4">
    <h5>Find Your Coffee Match ☕</h5>

    <div class="row mt-2">
      <div class="col-md-4">
        <select id="coffeeType" class="form-control">
          <option value="">Coffee Type</option>
          <option>Espresso</option>
          <option>Latte</option>
          <option>Cold Brew</option>
        </select>
      </div>

      <div class="col-md-4">
        <input id="cafePref" class="form-control" placeholder="Preferred café">
      </div>

      <div class="col-md-4">
        <button class="btn btn-primary w-100" onclick="findMatch()">
          Find Match
        </button>
      </div>
    </div>

    <div class="row mt-3" id="matchResults"></div>
  </div>

  <!-- USER LIST -->
  <div class="row" id="userList"></div>

</div>

<script src="js/explore.js"></script>

</body>
</html>
