<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – cuplog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="top-nav">
  <a class="brand" href="#"><span>cup</span>log</a>
  <ul class="nav-links">
    <li><a href="#">My journal</a></li>
    <li><a href="#">Log a coffee</a></li>
    <li><a href="#">Community</a></li>
    <li><a href="{{ url_for('game') }}">Coffee Crafter</a></li>
  </ul>
</nav>

<!-- SIGNUP CARD -->
<div class="signup-container">
  <div class="signup-card">
    <h2 class="card-title text-center">Create account</h2>
    <p class="card-sub text-center">Join the CupLog community</p>

    <!-- ERROR MESSAGE -->
    <div id="errorMsg" class="error-msg"></div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="signupUsername" class="form-control" placeholder="Choose a username"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="signupEmail" class="form-control" placeholder="you@email.com"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="signupPassword" class="form-control" placeholder="Create a password"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Confirm password</label>
      <input type="password" id="signupConfirm" class="form-control" placeholder="Confirm your password"/>
    </div>

    <button class="btn btn-signup w-100 mt-2" id="signupBtn">Create account</button>

    <p class="text-center mt-3 small">
      Already have an account? <a href="{{ url_for('home') }}" class="login-link">Log in</a>
    </p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  cuplog · CITS5505 Group Project 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
