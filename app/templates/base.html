<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}cuplog{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block styles %}{% endblock %}
</head>
<body>

    <nav class="top-nav">
        <a class="brand" href="{{ url_for('main.home') }}"><span>cup</span>log</a>
        <ul class="nav-links"> <!-- Add navigation links here -->
            <li><a href="{{ url_for('main.my_journal') }}" class="{{ 'active' if request.endpoint == 'main.my_journal' else '' }}">My Journal</a></li>
            <li><a href="{{ url_for('main.log_coffee') }}" class="{{ 'active' if request.endpoint == 'main.log_coffee' else '' }}">Log a Coffee</a></li>
            <li><a href="{{ url_for('main.explore') }}" class="{{ 'active' if request.endpoint == 'main.explore' else '' }}">Explore</a></li>
            <li><a href="{{ url_for('main.messages') }}" class="{{ 'active' if request.endpoint == 'main.messages' else '' }}">Messages</a></li>
            <li><a href="{{ url_for('main.game') }}" class="{{ 'active' if request.endpoint == 'main.game' else '' }}">Coffee Crafter</a></li>
            <li><a href="#" onclick="confirmLogout(event)" class="logout-link">Logout</a></li>
        </ul>
    </nav>
<!-- Main content area of each page that extends the base template -->
    <main>
        {% block content %}{% endblock %}
    </main>
     <footer>
        cuplog · CITS3403/CITS5505 Group Project 2026
    </footer>
    <script>
    function confirmLogout(e) {
        e.preventDefault();
        if (confirm('Are you sure you want to logout?')) {
            window.location.href = "{{ url_for('main.logout') }}";
    }
}
</script>
    {% block scripts %}{% endblock %}
</body>
</html>
