<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}cuplog{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block styles %}{% endblock %}
</head>
<body>

    <nav class="top-nav">
        <a class="brand" href="{{ url_for('home') }}"><span>cup</span>log</a>
        <ul class="nav-links"> <!-- Add navigation links here -->
            <li><a href="{{ url_for('my_journal') }}" class="{{ 'active' if request.endpoint == 'my_journal' else '' }}">My Journal</a></li>
            <li><a href="{{ url_for('log_coffee') }}" class="{{ 'active' if request.endpoint == 'log_coffee' else '' }}">Log a Coffee</a></li>
            <li><a href="{{ url_for('explore') }}" class="{{ 'active' if request.endpoint == 'explore' else '' }}">Explore</a></li>
            <li><a href="{{ url_for('game') }}" class="{{ 'active' if request.endpoint == 'game' else '' }}">Coffee Crafter</a></li>
            <li><a href="{{ url_for('messages') }}">Messages</a></li>
</html>
    
        </ul>
    </nav>
<!-- Main content area of each page that extends the base template -->
    <main>
        {% block content %}{% endblock %}
    </main>
     <footer>
        cuplog · CITS3403/CITS5505 Group Project 2026
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
