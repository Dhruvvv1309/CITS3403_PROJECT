<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – cuplog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="top-nav">
  <a class="brand" href="#"><span>cup</span>log</a>
  <ul class="nav-links">
    <li><a href="#">My journal</a></li>
    <li><a href="#">Log a coffee</a></li>
    <li><a href="#">Community</a></li>
  </ul>
</nav>

<!-- PAGE WRAPPER -->
<div class="page-wrapper">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h1 class="brand-name">Every sip,<br>remembered.</h1>
    <p class="brand-desc">Log your coffee journey, discover what others are drinking, and build your personal coffee passport.</p>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="login-card">
      <h2 class="card-title">Welcome back</h2>
      <p class="card-sub">Log in to your journal</p>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="you@email.com"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter your password"/>
      </div>

      <button class="btn btn-login w-100 mt-2">Log in</button>

      <div class="divider">or</div>

      <a href="signup.html" class="btn btn-create w-100">Create an account</a>

      <p class="text-center mt-3 small">
        <a href="#" class="forgot-link">Forgot password?</a>
      </p>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  cuplog · CITS3403 Group Project 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
